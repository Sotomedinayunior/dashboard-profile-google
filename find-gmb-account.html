<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Encontrar GMB Account ID — Nelly RAC</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 640px; margin: 60px auto; padding: 20px; background: #f9f9f9; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  p { color: #555; font-size: 14px; }
  input { width: 100%; padding: 10px; font-size: 13px; border: 1px solid #ccc; border-radius: 6px; margin: 6px 0; box-sizing: border-box; }
  button { background: #1a73e8; color: #fff; border: none; padding: 10px 24px; border-radius: 6px; font-size: 14px; cursor: pointer; margin-top: 8px; }
  button:hover { background: #1558b0; }
  pre { background: #1e1e1e; color: #a8ff78; padding: 16px; border-radius: 8px; font-size: 13px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
  .step { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  .label { font-size: 12px; font-weight: 600; color: #666; margin-bottom: 4px; }
  .result-box { margin-top: 16px; }
  .account-id { font-size: 18px; font-weight: 700; color: #1a73e8; background: #e8f0fe; padding: 12px 16px; border-radius: 6px; margin: 8px 0; word-break: break-all; }
  .error { color: #c00; background: #fce; padding: 10px; border-radius: 6px; font-size: 13px; }
</style>
</head>
<body>

<h1>Encontrar GMB Account ID</h1>
<p>Esta herramienta llama directamente a la API de Google Business Profile desde tu navegador usando tu refresh token de Vercel.</p>

<div class="step">
  <div class="label">1. Pega tus credenciales de Vercel</div>
  <input id="clientId"     placeholder="GOOGLE_CLIENT_ID  (ej: 868126352484-xxxx.apps.googleusercontent.com)" />
  <input id="clientSecret" placeholder="GOOGLE_CLIENT_SECRET  (ej: GOCSPX-xxxxx)" type="password" />
  <input id="refreshToken" placeholder="GOOGLE_REFRESH_TOKEN  (ej: 1//0fXxxxxxx)" type="password" />
  <button onclick="findAccount()">Buscar Account ID</button>
</div>

<div id="output"></div>

<script>
async function findAccount() {
  const clientId     = document.getElementById('clientId').value.trim();
  const clientSecret = document.getElementById('clientSecret').value.trim();
  const refreshToken = document.getElementById('refreshToken').value.trim();
  const out = document.getElementById('output');

  if (!clientId || !clientSecret || !refreshToken) {
    out.innerHTML = '<div class="error">Completa todos los campos.</div>';
    return;
  }

  out.innerHTML = '<p>Obteniendo token de acceso...</p>';

  try {
    // Step 1: Exchange refresh token for access token
    const tokenResp = await fetch('https://oauth2.googleapis.com/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        client_id:     clientId,
        client_secret: clientSecret,
        refresh_token: refreshToken,
        grant_type:    'refresh_token',
      }),
    });

    const tokenData = await tokenResp.json();
    if (!tokenData.access_token) {
      out.innerHTML = `<div class="error">Error obteniendo token: ${JSON.stringify(tokenData)}</div>`;
      return;
    }

    out.innerHTML = '<p>Token obtenido. Consultando cuentas de Google Business...</p>';

    // Step 2: Call accounts API
    const acctResp = await fetch('https://mybusinessaccountmanagement.googleapis.com/v1/accounts', {
      headers: { Authorization: 'Bearer ' + tokenData.access_token },
    });

    const acctData = await acctResp.json();

    if (!acctResp.ok) {
      out.innerHTML = `<div class="error">Error ${acctResp.status}: ${acctData?.error?.message || JSON.stringify(acctData)}</div>`;
      return;
    }

    const accounts = acctData.accounts || [];
    if (!accounts.length) {
      out.innerHTML = '<div class="error">No se encontraron cuentas de Google Business para este usuario.</div>';
      return;
    }

    let html = '<div class="result-box"><h3 style="margin:0 0 12px">Cuentas encontradas:</h3>';
    accounts.forEach(a => {
      html += `
        <div style="margin-bottom:12px">
          <div class="label">${a.accountName || a.name}</div>
          <div class="account-id">${a.name}</div>
          <div style="font-size:12px;color:#888">Tipo: ${a.type || '—'} · Estado: ${a.verificationState || '—'}</div>
        </div>`;
    });

    html += `<div style="margin-top:16px;padding:14px;background:#e8f5e9;border-radius:8px;font-size:13px">
      <strong>Siguiente paso:</strong><br>
      Copia el valor de <strong>Account ID</strong> de arriba y agrégalo en Vercel:<br>
      <code style="background:#fff;padding:2px 6px;border-radius:4px">GMB_ACCOUNT_NAME = ${accounts[0].name}</code>
    </div>`;

    html += '<h3 style="margin:16px 0 8px">Respuesta completa:</h3>';
    html += `<pre>${JSON.stringify(acctData, null, 2)}</pre>`;
    html += '</div>';

    out.innerHTML = html;

  } catch(e) {
    out.innerHTML = `<div class="error">Error: ${e.message}</div>`;
  }
}
</script>
</body>
</html>
